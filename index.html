<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>squint — can you see the difference?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0c0f;
      --surface: #16161a;
      --border:  #252530;
      --text:    #eeeef4;
      --muted:   #6b6b80;
      --accent:  #7c6cfc;
      --gold:    #f9c74f;
      --green:   #4ade80;
      --red:     #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* ── Header ────────────────────────────────────────────── */
    header { text-align: center; margin-bottom: 28px; }

    .wordmark {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #a89cfd 0%, #7c6cfc 50%, #5a4de0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Stats ─────────────────────────────────────────────── */
    .stats {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .stat { text-align: center; padding: 12px 20px; position: relative; }
    .stat + .stat::before {
      content: '';
      position: absolute;
      left: 0; top: 25%; bottom: 25%;
      width: 1px; background: var(--border);
    }

    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 800;
      margin-top: 2px;
      letter-spacing: -0.02em;
    }

    #score-value { color: var(--accent); }
    #best-value  { color: var(--gold); }
    #lives-value { font-size: 1rem; margin-top: 5px; }
    #level-value { color: var(--green); }

    /* ── Combo badge ───────────────────────────────────────── */
    #combo-badge {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(249, 199, 79, 0.12);
      border: 1px solid rgba(249, 199, 79, 0.3);
      border-radius: 99px;
      padding: 5px 14px;
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 14px;
      animation: comboPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #combo-badge.visible { display: flex; }

    @keyframes comboPop {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Timer ─────────────────────────────────────────────── */
    .timer-wrap {
      width: 100%;
      max-width: 500px;
      margin-bottom: 18px;
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    #timer-bar { height: 100%; border-radius: 99px; transition: width 0.1s linear, background 0.4s; }

    /* ── Grid ──────────────────────────────────────────────── */
    #grid {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
      /* blur transition — the squint effect */
      transition: filter 0.3s ease;
    }

    .tile {
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      border: 2px solid transparent;
    }

    .tile:hover {
      transform: scale(1.06);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.12);
    }

    .tile.correct { animation: pop   0.35s ease forwards; border-color: var(--green); }
    .tile.wrong   { animation: shake 0.35s ease forwards; border-color: var(--red);   }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-7px); }
      75%       { transform: translateX(7px); }
    }

    /* ── Overlay ───────────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      backdrop-filter: blur(8px);
      padding: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 36px 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    /* ── Start screen ──────────────────────────────────────── */
    .eye-wrap {
      margin-bottom: 8px;
      line-height: 1;
    }

    .eye-emoji {
      font-size: 2.6rem;
      display: inline-block;
      animation: squint-eye 5s ease-in-out infinite;
      transform-origin: center 60%;
    }

    @keyframes squint-eye {
      0%, 30%, 100% { transform: scaleY(1); }
      42%            { transform: scaleY(0.08); }  /* squint */
      54%            { transform: scaleY(1); }
      62%            { transform: scaleY(0.08); }  /* squint again */
      72%            { transform: scaleY(1); }
    }

    .card-logo {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #a89cfd 0%, #7c6cfc 50%, #5a4de0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .card .subtitle {
      color: var(--muted);
      font-size: 0.875rem;
      line-height: 1.6;
    }

    /* Colour swatch demo */
    .swatch-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      margin: 16px auto 4px;
    }

    .swatch {
      width: 26px; height: 26px;
      border-radius: 6px;
    }

    .swatch.odd { box-shadow: 0 0 0 2px var(--accent); }
    .swatch-hint { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.04em; }

    /* ── Game Over card ────────────────────────────────────── */
    .card h2 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .final-score {
      font-size: 3.8rem;
      font-weight: 900;
      color: var(--accent);
      margin: 16px 0 2px;
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .final-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .best-line {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--gold);
      font-weight: 600;
    }

    .best-line.new-best {
      animation: newBestPulse 0.6s ease forwards;
      color: var(--gold);
    }

    @keyframes newBestPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .max-combo-line {
      margin-top: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* Name input */
    .name-section { margin-top: 18px; }
    .name-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .name-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      padding: 11px 14px;
      outline: none;
      text-align: center;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .name-input:focus { border-color: var(--accent); }
    .name-input::placeholder { color: var(--muted); }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn-primary {
      display: block; width: 100%;
      margin-top: 20px;
      background: var(--accent);
      color: #fff;
      border: none; border-radius: 11px;
      padding: 13px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
    }

    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

    .btn-ghost {
      display: block; width: 100%;
      margin-top: 10px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 11px;
      font-size: 0.875rem; font-weight: 500;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    /* ── Leaderboard card ──────────────────────────────────── */
    #view-leaderboard { display: none; }

    .lb-header { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .lb-trophy { font-size: 1.3rem; }

    .lb-your-score { font-size: 0.82rem; color: var(--muted); margin-top: 5px; }
    .lb-your-score span { color: var(--accent); font-weight: 700; }

    .lb-list { margin-top: 18px; text-align: left; }

    .lb-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 6px; border-radius: 8px;
    }

    .lb-row + .lb-row { border-top: 1px solid var(--border); border-radius: 0; }

    .lb-row.you {
      background: rgba(124,108,252,0.12);
      border-top: none !important;
      border-radius: 8px !important;
      margin: 2px 0;
    }

    .lb-rank { width: 28px; text-align: center; font-size: 0.85rem; color: var(--muted); flex-shrink: 0; }
    .lb-name { flex: 1; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { font-weight: 800; font-size: 0.95rem; color: var(--accent); flex-shrink: 0; }
    .lb-empty { color: var(--muted); font-size: 0.9rem; padding: 24px 0; }
    .lb-loading { display: flex; justify-content: center; padding: 24px 0; }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ─────────────────────────────────────────────── */
    #toast {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 20px;
      font-size: 0.88rem; font-weight: 700;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 20; pointer-events: none;
    }

    #toast.show   { transform: translateX(-50%) translateY(0); }
    #toast.correct { color: var(--green); }
    #toast.wrong   { color: var(--red); }
    #toast.info    { color: var(--accent); }

    /* ── Confetti canvas (injected by JS) ──────────────────── */
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 30;
    }
  </style>
</head>
<body>

<header>
  <div class="wordmark">squint</div>
  <p>can you see the difference?</p>
</header>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Score</div>
    <div class="stat-value" id="score-value">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Best</div>
    <div class="stat-value" id="best-value">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Lives</div>
    <div class="stat-value" id="lives-value">❤️❤️❤️</div>
  </div>
  <div class="stat">
    <div class="stat-label">Level</div>
    <div class="stat-value" id="level-value">1</div>
  </div>
</div>

<!-- Combo streak badge -->
<div id="combo-badge">
  <span>🔥</span>
  <span id="combo-num">2</span><span>x combo!</span>
</div>

<div class="timer-wrap">
  <div id="timer-bar" style="width:100%; background: var(--accent)"></div>
</div>

<!-- The grid blurs as time runs out — you have to squint -->
<div id="grid"></div>

<!-- ── Overlay ─────────────────────────────────────────────── -->
<div id="overlay">

  <!-- Start / Game Over view -->
  <div class="card" id="view-main">

    <!-- START screen -->
    <div id="phase-start">
      <div class="eye-wrap"><span class="eye-emoji">👁️</span></div>
      <div class="card-logo">squint</div>
      <p class="subtitle">Find the tile with a slightly different colour.<br>The gap gets smaller — and the grid gets <em>blurrier</em> — as you go.</p>
      <div class="swatch-row" id="demo-swatches"></div>
      <p class="swatch-hint">← spot the odd one out</p>
      <button class="btn-primary" id="btn-play">Play</button>
      <button class="btn-ghost" id="btn-view-lb">🏆 Leaderboard</button>
    </div>

    <!-- GAME OVER screen -->
    <div id="phase-gameover" style="display:none">
      <h2>Game Over</h2>
      <div class="final-score" id="final-score"></div>
      <div class="final-label">points</div>
      <div class="best-line" id="best-line"></div>
      <div class="max-combo-line" id="max-combo-line"></div>
      <div class="name-section">
        <p class="name-label">Your name for the leaderboard</p>
        <input class="name-input" id="name-input" type="text" placeholder="e.g. eagle-eye" maxlength="20" autocomplete="off" spellcheck="false" />
      </div>
      <button class="btn-primary" id="btn-submit">Submit Score</button>
      <div class="btn-row">
        <button class="btn-ghost" id="btn-share">Share 👁️</button>
        <button class="btn-ghost" id="btn-skip">Skip →</button>
      </div>
    </div>

  </div>

  <!-- Leaderboard view -->
  <div class="card" id="view-leaderboard">
    <div class="lb-header">
      <span class="lb-trophy">🏆</span>
      <h2>Leaderboard</h2>
    </div>
    <p class="lb-your-score" id="lb-your-score"></p>
    <div class="lb-list" id="lb-list">
      <div class="lb-loading"><div class="spinner"></div></div>
    </div>
    <button class="btn-primary" id="btn-play-again">Play Again</button>
    <button class="btn-ghost" id="btn-back-start">Back to Start</button>
  </div>

</div>

<div id="toast"></div>

<script>
  // ─── State ────────────────────────────────────────────────────────────────────
  const state = {
    score: 0,
    best: parseInt(localStorage.getItem('squint_best') || '0'),
    lives: 3,
    level: 1,
    answer: -1,
    locked: false,
    timerPct: 100,
    timerInterval: null,
    timerDuration: 7000,
    combo: 0,
    maxCombo: 0,
  };

  let lastScore = 0;

  // ─── DOM refs ─────────────────────────────────────────────────────────────────
  const $overlay       = document.getElementById('overlay');
  const $grid          = document.getElementById('grid');
  const $bar           = document.getElementById('timer-bar');
  const $toast         = document.getElementById('toast');
  const $comboBadge    = document.getElementById('combo-badge');
  const $comboNum      = document.getElementById('combo-num');

  const $score         = document.getElementById('score-value');
  const $best          = document.getElementById('best-value');
  const $lives         = document.getElementById('lives-value');
  const $level         = document.getElementById('level-value');

  const $viewMain      = document.getElementById('view-main');
  const $viewLB        = document.getElementById('view-leaderboard');
  const $phaseStart    = document.getElementById('phase-start');
  const $phaseGameover = document.getElementById('phase-gameover');

  const $finalScore    = document.getElementById('final-score');
  const $bestLine      = document.getElementById('best-line');
  const $maxComboLine  = document.getElementById('max-combo-line');
  const $nameInput     = document.getElementById('name-input');
  const $lbList        = document.getElementById('lb-list');
  const $lbYourScore   = document.getElementById('lb-your-score');

  // ─── Demo swatches ────────────────────────────────────────────────────────────
  (function buildDemo() {
    const base = { r: 100, g: 130, b: 200 };
    const odd  = { r: 134, g: 130, b: 200 };
    const wrap = document.getElementById('demo-swatches');
    for (let i = 0; i < 9; i++) {
      const d = document.createElement('div');
      d.className = 'swatch' + (i === 5 ? ' odd' : '');
      const c = i === 5 ? odd : base;
      d.style.background = `rgb(${c.r},${c.g},${c.b})`;
      wrap.appendChild(d);
    }
  })();

  // ─── Level config ─────────────────────────────────────────────────────────────
  function levelConfig(level) {
    const c = [
      { gridSize:3, delta:80 }, { gridSize:3, delta:60 },
      { gridSize:4, delta:50 }, { gridSize:4, delta:38 },
      { gridSize:4, delta:28 }, { gridSize:5, delta:22 },
      { gridSize:5, delta:16 }, { gridSize:5, delta:12 },
      { gridSize:6, delta:9  }, { gridSize:6, delta:6  },
    ];
    return c[Math.min(level - 1, c.length - 1)];
  }

  function levelUpMessage(level) {
    if (level <= 3) return `Level ${level}! 🎯`;
    if (level <= 5) return `Level ${level} — eyes open! 👀`;
    if (level <= 7) return `Level ${level} — squint harder! 👁️`;
    if (level <= 9) return `Level ${level} — nearly invisible 😬`;
    return `MAXIMUM SQUINT 🥵`;
  }

  // ─── Colour helpers ───────────────────────────────────────────────────────────
  const rand  = (lo, hi) => Math.floor(Math.random() * (hi - lo + 1)) + lo;
  const clamp = v => Math.max(0, Math.min(255, v));
  const toRgb = (r,g,b) => `rgb(${r},${g},${b})`;

  function generateRound(level) {
    const cfg = levelConfig(level);
    const n   = cfg.gridSize * cfg.gridSize;
    const base = { r: rand(40,215), g: rand(40,215), b: rand(40,215) };
    const ch  = ['r','g','b'][rand(0,2)];
    const dir = Math.random() < 0.5 ? 1 : -1;
    const odd = { ...base };
    odd[ch] = clamp(base[ch] + dir * (Math.floor(cfg.delta * 0.55) + rand(0, Math.floor(cfg.delta * 0.45))));
    const answer = rand(0, n - 1);
    const colors = Array.from({ length: n }, (_, i) =>
      i === answer ? toRgb(odd.r, odd.g, odd.b) : toRgb(base.r, base.g, base.b)
    );
    return { colors, answer, gridSize: cfg.gridSize };
  }

  // ─── Timer (with blur effect) ─────────────────────────────────────────────────
  function startTimer() {
    clearInterval(state.timerInterval);
    state.timerPct = 100;
    $bar.style.width = '100%';
    $bar.style.background = 'var(--accent)';
    $grid.style.filter = 'blur(0px)';

    const steps = 100;
    const stepMs = state.timerDuration / steps;
    let step = 0;

    state.timerInterval = setInterval(() => {
      step++;
      state.timerPct = 100 - (step / steps) * 100;

      // Timer bar colour
      $bar.style.width = state.timerPct + '%';
      $bar.style.background = state.timerPct < 30
        ? 'var(--red)'
        : state.timerPct < 60 ? 'var(--gold)' : 'var(--accent)';

      // ★ Squint effect — grid blurs as time runs out
      // Blur starts kicking in at 50% time remaining, maxes at 0%
      const blurProgress = Math.max(0, (1 - state.timerPct / 100) - 0.5) / 0.5;
      const blur = blurProgress * 5; // 0 → 5px
      $grid.style.filter = `blur(${blur.toFixed(2)}px)`;

      if (step >= steps) { clearInterval(state.timerInterval); onTimeout(); }
    }, stepMs);
  }

  function stopTimer() {
    clearInterval(state.timerInterval);
    $grid.style.filter = 'blur(0px)';
  }

  function onTimeout() {
    if (state.locked) return;
    state.locked = true;
    state.combo = 0;
    updateComboBadge();
    loseLife();
    showToast("Time's up!", 'wrong');
    $grid.querySelectorAll('.tile')[state.answer].classList.add('correct');
    setTimeout(nextRound, 900);
  }

  // ─── Game logic ───────────────────────────────────────────────────────────────
  function loseLife() {
    state.lives = Math.max(0, state.lives - 1);
    updateStats();
    if (state.lives === 0) setTimeout(gameOver, 500);
  }

  function gameOver() {
    stopTimer();
    lastScore = state.score;
    const isNewBest = state.score > 0 && state.score >= state.best;
    if (isNewBest) {
      state.best = state.score;
      localStorage.setItem('squint_best', state.best);
      launchConfetti();
    }

    $finalScore.textContent = String(state.score);
    $bestLine.textContent = isNewBest ? '🎉 New personal best!' : `Personal best: ${state.best}`;
    $bestLine.className = 'best-line' + (isNewBest ? ' new-best' : '');
    $maxComboLine.textContent = state.maxCombo >= 2
      ? `Max combo: 🔥 ${state.maxCombo}x`
      : '';

    $phaseStart.style.display    = 'none';
    $phaseGameover.style.display = '';
    $viewMain.style.display      = '';
    $viewLB.style.display        = 'none';
    $nameInput.value = '';
    $overlay.style.display = 'flex';
    setTimeout(() => $nameInput.focus(), 100);
  }

  function startGame() {
    state.score = 0;
    state.lives = 3;
    state.level = 1;
    state.locked = false;
    state.timerDuration = 7000;
    state.combo = 0;
    state.maxCombo = 0;
    updateComboBadge();
    updateStats();
    $overlay.style.display = 'none';
    nextRound();
  }

  function nextRound() {
    if (state.lives <= 0) return;
    state.locked = false;
    const newLevel = Math.floor(state.score / 5) + 1;
    if (newLevel !== state.level) {
      state.level = newLevel;
      state.timerDuration = Math.max(3000, 7000 - (state.level - 1) * 300);
      showToast(levelUpMessage(state.level), 'info');
    }
    const { colors, answer, gridSize } = generateRound(state.level);
    state.answer = answer;
    renderGrid(colors, gridSize);
    updateStats();
    startTimer();
  }

  function renderGrid(colors, gridSize) {
    $grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
    const tileSize = Math.min(
      Math.floor((Math.min(window.innerWidth, 500) - 40) / gridSize) - 8,
      90
    );
    while ($grid.firstChild) $grid.removeChild($grid.firstChild);
    colors.forEach((color, i) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.style.cssText = `width:${tileSize}px;height:${tileSize}px;background:${color}`;
      tile.addEventListener('click', () => onTileClick(i));
      $grid.appendChild(tile);
    });
  }

  function onTileClick(index) {
    if (state.locked) return;
    state.locked = true;
    stopTimer();

    const tiles = $grid.querySelectorAll('.tile');

    if (index === state.answer) {
      tiles[index].classList.add('correct');
      state.combo++;
      state.maxCombo = Math.max(state.maxCombo, state.combo);

      const mult = Math.min(state.combo, 5);
      const pts  = Math.max(1, Math.round((state.timerPct / 100) * state.level * 10 * mult));
      state.score += pts;

      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem('squint_best', state.best);
      }

      const label = mult >= 2 ? `+${pts} (${mult}x combo!)` : `+${pts}`;
      showToast(label, 'correct');
      updateComboBadge();
    } else {
      tiles[index].classList.add('wrong');
      tiles[state.answer].classList.add('correct');
      state.combo = 0;
      updateComboBadge();
      loseLife();
      showToast('Wrong!', 'wrong');
    }

    updateStats();
    setTimeout(nextRound, 850);
  }

  // ─── Combo badge ──────────────────────────────────────────────────────────────
  function updateComboBadge() {
    if (state.combo >= 2) {
      $comboNum.textContent = state.combo;
      $comboBadge.classList.add('visible');
      // Re-trigger animation
      $comboBadge.style.animation = 'none';
      $comboBadge.offsetHeight; // reflow
      $comboBadge.style.animation = '';
    } else {
      $comboBadge.classList.remove('visible');
    }
  }

  // ─── Confetti ─────────────────────────────────────────────────────────────────
  function launchConfetti() {
    const canvas = document.createElement('canvas');
    canvas.id = 'confetti-canvas';
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    document.body.appendChild(canvas);

    const ctx = canvas.getContext('2d');
    const colors = ['#7c6cfc','#a89cfd','#f9c74f','#4ade80','#f87171','#fff'];
    const particles = Array.from({ length: 90 }, () => ({
      x:    Math.random() * canvas.width,
      y:    -10 - Math.random() * 40,
      size: Math.random() * 7 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx:   (Math.random() - 0.5) * 5,
      vy:   Math.random() * 3 + 2,
      rot:  Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.15,
      isRect: Math.random() > 0.4,
    }));

    let frame = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.09;
        p.rot += p.rotV;
        ctx.save();
        ctx.globalAlpha = Math.max(0, 1 - frame / 110);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        if (p.isRect) {
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.5);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      });
      frame++;
      if (frame < 130) requestAnimationFrame(draw);
      else canvas.remove();
    }
    draw();
  }

  // ─── Share score ──────────────────────────────────────────────────────────────
  async function shareScore(score) {
    const text = `I scored ${score} pts on squint 👁️ — can you beat me?\nhttps://squint-color-game.vercel.app`;
    try {
      if (navigator.share) {
        await navigator.share({ title: 'squint', text });
      } else {
        await navigator.clipboard.writeText(text);
        showToast('Score copied!', 'correct');
      }
    } catch { /* user cancelled */ }
  }

  // ─── Leaderboard API ──────────────────────────────────────────────────────────
  async function postScore(name, score) {
    try {
      await fetch('/api/leaderboard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, score }),
      });
    } catch { /* silently fail */ }
  }

  async function fetchScores() {
    const res = await fetch('/api/leaderboard');
    if (!res.ok) throw new Error('fetch failed');
    return res.json();
  }

  const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function renderLB(scores, yourScore) {
    if (!scores || !scores.length) {
      $lbList.innerHTML = '<p class="lb-empty">No scores yet — be the first!</p>';
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    $lbList.innerHTML = scores.map((e, i) => {
      const isYou = yourScore !== null && e.score === yourScore;
      return `<div class="lb-row${isYou ? ' you' : ''}">
        <span class="lb-rank">${medals[i] || (i + 1)}</span>
        <span class="lb-name">${escHtml(e.name)}${isYou ? ' <span style="color:var(--accent);font-size:.75rem">(you)</span>' : ''}</span>
        <span class="lb-score">${e.score}</span>
      </div>`;
    }).join('');
  }

  async function showLeaderboard(yourScore) {
    $viewMain.style.display = 'none';
    $viewLB.style.display   = '';
    $lbList.innerHTML = '<div class="lb-loading"><div class="spinner"></div></div>';
    $lbYourScore.innerHTML = yourScore !== null
      ? `Your score: <span>${yourScore}</span>`
      : '';
    try {
      renderLB(await fetchScores(), yourScore);
    } catch {
      $lbList.innerHTML = '<p class="lb-empty">Couldn\'t load scores right now.</p>';
    }
  }

  // ─── Button handlers ──────────────────────────────────────────────────────────
  document.getElementById('btn-play').addEventListener('click', startGame);

  document.getElementById('btn-view-lb').addEventListener('click', () => showLeaderboard(null));

  document.getElementById('btn-submit').addEventListener('click', async () => {
    const name = $nameInput.value.trim() || 'Anonymous';
    await postScore(name, lastScore);
    showLeaderboard(lastScore);
  });

  document.getElementById('btn-share').addEventListener('click', () => shareScore(lastScore));

  document.getElementById('btn-skip').addEventListener('click', () => showLeaderboard(lastScore));

  document.getElementById('btn-play-again').addEventListener('click', () => {
    $viewLB.style.display        = 'none';
    $viewMain.style.display      = '';
    $phaseGameover.style.display = 'none';
    $phaseStart.style.display    = '';
    startGame();
  });

  document.getElementById('btn-back-start').addEventListener('click', () => {
    $viewLB.style.display        = 'none';
    $viewMain.style.display      = '';
    $phaseGameover.style.display = 'none';
    $phaseStart.style.display    = '';
  });

  $nameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-submit').click();
  });

  // ─── UI helpers ───────────────────────────────────────────────────────────────
  function updateStats() {
    $score.textContent = String(state.score);
    $best.textContent  = String(state.best);
    $level.textContent = String(state.level);
    const hearts = ['','❤️','❤️❤️','❤️❤️❤️'];
    $lives.textContent = hearts[state.lives] || '💀';
  }

  let toastTimer;
  function showToast(msg, type) {
    $toast.textContent = msg;
    $toast.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { $toast.className = ''; }, 1400);
  }

  // ─── Init ─────────────────────────────────────────────────────────────────────
  updateStats();
</script>
</body>
</html>
